name: Bug Report
description: You have found something wrong with Shiny Speech
title: "[Bug]: "
labels: [bug, unverified]
body:
  - type: textarea
    validations:
      required: true
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1.
        2.
        3.
  - type: textarea
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: exception
    attributes:
      label: Exception or Log output
      description: Please copy and paste any relevant log output
  - type: textarea
    id: codesample
    attributes:
      label: Code Sample
      description: Please include a github repo with your reproducible sample
